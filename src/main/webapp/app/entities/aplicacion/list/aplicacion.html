<div>
  <h2 id="page-heading" data-cy="AplicacionHeading">
    <span jhiTranslate="jhipsterMonoliticSampleApplicationApp.aplicacion.home.title">Aplicacions</span>

    <div class="d-flex justify-content-end">
      <button class="btn btn-info me-2" (click)="load()" [disabled]="isLoading()">
        <fa-icon icon="sync" [animation]="isLoading() ? 'spin' : undefined" />
        <span jhiTranslate="jhipsterMonoliticSampleApplicationApp.aplicacion.home.refreshListLabel">Refresh list</span>
      </button>

      <button
        id="jh-create-entity"
        data-cy="entityCreateButton"
        class="btn btn-primary jh-create-entity create-aplicacion"
        [routerLink]="['/aplicacion/new']"
      >
        <fa-icon icon="plus" />
        <span jhiTranslate="jhipsterMonoliticSampleApplicationApp.aplicacion.home.createLabel">Create a new Aplicacion</span>
      </button>
    </div>
  </h2>

  <jhi-alert-error />

  <jhi-alert />

  @if (aplicacions().length === 0) {
    <div class="alert alert-warning" id="no-result">
      <span jhiTranslate="jhipsterMonoliticSampleApplicationApp.aplicacion.home.notFound">No Aplicacions found</span>
    </div>
  } @else {
    <div class="table-responsive table-entities" id="entities">
      <table class="table table-striped" aria-describedby="page-heading">
        <thead>
          <tr jhiSort [(sortState)]="sortState" (sortChange)="navigateToWithComponentValues($event)">
            <th scope="col" jhiSortBy="id">
              <div class="d-flex">
                <span jhiTranslate="global.field.id">ID</span>

                <fa-icon class="p-1" icon="sort" />
              </div>
            </th>
            <th scope="col" jhiSortBy="nombre">
              <div class="d-flex">
                <span jhiTranslate="jhipsterMonoliticSampleApplicationApp.aplicacion.nombre">Nombre</span>

                <fa-icon class="p-1" icon="sort" />
              </div>
            </th>
            <th scope="col"></th>
          </tr>
        </thead>
        <tbody infinite-scroll (scrolled)="loadNextPage()" [infiniteScrollDisabled]="!hasMorePage()" [infiniteScrollDistance]="0">
          @for (aplicacion of aplicacions(); track trackId(aplicacion)) {
            <tr data-cy="entityTable">
              <td>
                <a [routerLink]="['/aplicacion', aplicacion.id, 'view']">{{ aplicacion.id }}</a>
              </td>
              <td>{{ aplicacion.nombre }}</td>
              <td class="text-end">
                <div class="btn-group">
                  <a [routerLink]="['/aplicacion', aplicacion.id, 'view']" class="btn btn-info btn-sm" data-cy="entityDetailsButton">
                    <fa-icon icon="eye" />
                    <span class="d-none d-md-inline" jhiTranslate="entity.action.view">View</span>
                  </a>

                  <a [routerLink]="['/aplicacion', aplicacion.id, 'edit']" class="btn btn-primary btn-sm" data-cy="entityEditButton">
                    <fa-icon icon="pencil-alt" />
                    <span class="d-none d-md-inline" jhiTranslate="entity.action.edit">Edit</span>
                  </a>

                  <button type="submit" (click)="delete(aplicacion)" class="btn btn-danger btn-sm" data-cy="entityDeleteButton">
                    <fa-icon icon="times" />
                    <span class="d-none d-md-inline" jhiTranslate="entity.action.delete">Delete</span>
                  </button>
                </div>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  }
</div>
