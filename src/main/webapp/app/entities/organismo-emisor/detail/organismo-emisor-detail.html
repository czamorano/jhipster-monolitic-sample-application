<div class="d-flex justify-content-center">
  <div class="col-8">
    @if (organismoEmisor(); as organismoEmisorRef) {
      <div>
        <h2 data-cy="organismoEmisorDetailsHeading">
          <span jhiTranslate="jhipsterMonoliticSampleApplicationApp.organismoEmisor.detail.title">Organismo Emisor</span>
        </h2>

        <hr />

        <jhi-alert-error />

        <jhi-alert />

        <dl class="row-md jh-entity-details">
          <dt><span jhiTranslate="global.field.id">ID</span></dt>
          <dd>
            <span>{{ organismoEmisorRef.id }}</span>
          </dd>
          <dt><span jhiTranslate="jhipsterMonoliticSampleApplicationApp.organismoEmisor.nombre">Nombre</span></dt>
          <dd>
            <span>{{ organismoEmisorRef.nombre }}</span>
          </dd>
          <dt><span jhiTranslate="jhipsterMonoliticSampleApplicationApp.organismoEmisor.codigo">Codigo</span></dt>
          <dd>
            <span>{{ organismoEmisorRef.codigo }}</span>
          </dd>
        </dl>

        <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
          <fa-icon icon="arrow-left" />&nbsp;<span jhiTranslate="entity.action.back">Back</span>
        </button>

        <button type="button" [routerLink]="['/organismo-emisor', organismoEmisorRef.id, 'edit']" class="btn btn-primary">
          <fa-icon icon="pencil-alt" />&nbsp;<span jhiTranslate="entity.action.edit">Edit</span>
        </button>
      </div>
    }
  </div>
</div>
