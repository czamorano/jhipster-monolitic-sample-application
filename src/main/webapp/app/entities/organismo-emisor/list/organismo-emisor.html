<div>
  <h2 id="page-heading" data-cy="OrganismoEmisorHeading">
    <span jhiTranslate="jhipsterMonoliticSampleApplicationApp.organismoEmisor.home.title">Organismo Emisors</span>

    <div class="d-flex justify-content-end">
      <button class="btn btn-info me-2" (click)="load()" [disabled]="isLoading()">
        <fa-icon icon="sync" [animation]="isLoading() ? 'spin' : undefined" />
        <span jhiTranslate="jhipsterMonoliticSampleApplicationApp.organismoEmisor.home.refreshListLabel">Refresh list</span>
      </button>

      <button
        id="jh-create-entity"
        data-cy="entityCreateButton"
        class="btn btn-primary jh-create-entity create-organismo-emisor"
        [routerLink]="['/organismo-emisor/new']"
      >
        <fa-icon icon="plus" />
        <span jhiTranslate="jhipsterMonoliticSampleApplicationApp.organismoEmisor.home.createLabel">Create a new Organismo Emisor</span>
      </button>
    </div>
  </h2>

  <jhi-alert-error />

  <jhi-alert />

  @if (organismoEmisors().length === 0) {
    <div class="alert alert-warning" id="no-result">
      <span jhiTranslate="jhipsterMonoliticSampleApplicationApp.organismoEmisor.home.notFound">No Organismo Emisors found</span>
    </div>
  } @else {
    <div class="table-responsive table-entities" id="entities">
      <table class="table table-striped" aria-describedby="page-heading">
        <thead>
          <tr jhiSort [(sortState)]="sortState" (sortChange)="navigateToWithComponentValues($event)">
            <th scope="col" jhiSortBy="id">
              <div class="d-flex">
                <span jhiTranslate="global.field.id">ID</span>

                <fa-icon class="p-1" icon="sort" />
              </div>
            </th>
            <th scope="col" jhiSortBy="nombre">
              <div class="d-flex">
                <span jhiTranslate="jhipsterMonoliticSampleApplicationApp.organismoEmisor.nombre">Nombre</span>

                <fa-icon class="p-1" icon="sort" />
              </div>
            </th>
            <th scope="col" jhiSortBy="codigo">
              <div class="d-flex">
                <span jhiTranslate="jhipsterMonoliticSampleApplicationApp.organismoEmisor.codigo">Codigo</span>

                <fa-icon class="p-1" icon="sort" />
              </div>
            </th>
            <th scope="col"></th>
          </tr>
        </thead>
        <tbody>
          @for (organismoEmisor of organismoEmisors(); track trackId(organismoEmisor)) {
            <tr data-cy="entityTable">
              <td>
                <a [routerLink]="['/organismo-emisor', organismoEmisor.id, 'view']">{{ organismoEmisor.id }}</a>
              </td>
              <td>{{ organismoEmisor.nombre }}</td>
              <td>{{ organismoEmisor.codigo }}</td>
              <td class="text-end">
                <div class="btn-group">
                  <a
                    [routerLink]="['/organismo-emisor', organismoEmisor.id, 'view']"
                    class="btn btn-info btn-sm"
                    data-cy="entityDetailsButton"
                  >
                    <fa-icon icon="eye" />
                    <span class="d-none d-md-inline" jhiTranslate="entity.action.view">View</span>
                  </a>

                  <a
                    [routerLink]="['/organismo-emisor', organismoEmisor.id, 'edit']"
                    class="btn btn-primary btn-sm"
                    data-cy="entityEditButton"
                  >
                    <fa-icon icon="pencil-alt" />
                    <span class="d-none d-md-inline" jhiTranslate="entity.action.edit">Edit</span>
                  </a>

                  <button type="submit" (click)="delete(organismoEmisor)" class="btn btn-danger btn-sm" data-cy="entityDeleteButton">
                    <fa-icon icon="times" />
                    <span class="d-none d-md-inline" jhiTranslate="entity.action.delete">Delete</span>
                  </button>
                </div>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  }
</div>
